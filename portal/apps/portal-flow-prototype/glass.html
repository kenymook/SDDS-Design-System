<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SDDS — пробник: стекло с дисперсией поверх токенов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#10C8B4; --brand-deep:#0A7F73; --on-brand:#041210; --radius:14px;
  --ink:#EDEDE7; --ink-dim:#8A8A82; --bg:#0B0B09; --line:rgba(237,237,231,.14);
  --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-display:'Unbounded',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font-mono);overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{display:block;width:100%;height:100%}
#scene{position:fixed;inset:0}

/* ─── шапка ─── */
.top{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;
  padding:22px 26px;pointer-events:none}
.title{font-family:var(--font-display);font-weight:900;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
.title i{display:block;font-style:normal;font-family:var(--font-mono);font-weight:400;font-size:10.5px;
  letter-spacing:.12em;color:var(--ink-dim);margin-top:7px;text-transform:none}
.back{pointer-events:auto;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
  text-decoration:none;border:1px solid var(--line);border-radius:99px;padding:8px 14px;transition:.2s}
.back:hover{color:var(--ink);border-color:var(--ink-dim)}

/* ─── пульт ─── */
.panel{position:fixed;right:26px;bottom:26px;z-index:5;width:290px;
  background:rgba(11,11,9,.72);backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px}
.panel h3{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);font-weight:400;margin-bottom:10px}
.brands{display:flex;gap:7px;margin-bottom:16px}
.chip{flex:1;height:30px;border-radius:9px;border:1px solid var(--line);cursor:pointer;transition:.2s;position:relative}
.chip:hover{transform:translateY(-2px)}
.chip[aria-pressed="true"]{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.row{display:grid;grid-template-columns:78px 1fr 40px;align-items:center;gap:9px;margin-bottom:9px}
.row label{font-size:10px;letter-spacing:.06em;color:var(--ink-dim)}
.row output{font-size:10px;color:var(--brand);text-align:right;transition:color .5s}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--brand);cursor:pointer;transition:background .5s}
.toggles{display:flex;gap:7px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
.tg{flex:1;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-dim);background:none;border:1px solid var(--line);border-radius:8px;padding:7px 4px;cursor:pointer;transition:.2s}
.tg[aria-pressed="true"]{color:var(--on-brand);background:var(--brand);border-color:var(--brand)}

.note{position:fixed;left:26px;bottom:26px;z-index:5;max-width:300px;font-size:10.5px;line-height:1.65;color:var(--ink-dim)}
.note b{color:var(--ink);font-weight:500}
.err{position:fixed;inset:auto 0 0 0;z-index:9;background:#5A1A12;color:#fff;padding:10px 16px;font-size:11px;display:none}
@media (max-width:820px){ .panel{left:26px;width:auto} .note{display:none} }
</style>
</head>
<body>
<div id="scene"></div>

<header class="top">
  <div class="title">Стекло с дисперсией<i>пробник поверх цветов живых токенов</i></div>
  <a class="back" href="./alt.html">← alt</a>
</header>

<aside class="panel">
  <h3>Бренд</h3>
  <div class="brands" id="brands"></div>
  <h3>Стекло</h3>
  <div class="row"><label>Дисперсия</label><input type="range" id="disp" min="0" max="24" step="0.5" value="14"><output id="dispV"></output></div>
  <div class="row"><label>Толщина</label><input type="range" id="thick" min="0" max="5" step="0.05" value="2.2"><output id="thickV"></output></div>
  <div class="row"><label>Плотность</label><input type="range" id="ior" min="1" max="2.4" step="0.01" value="1.62"><output id="iorV"></output></div>
  <div class="row"><label>Шершавость</label><input type="range" id="rough" min="0" max=".6" step="0.01" value="0.02"><output id="roughV"></output></div>
  <div class="toggles">
    <button class="tg" id="tgGlass" aria-pressed="true">Стекло</button>
    <button class="tg" id="tgSpin" aria-pressed="true">Вращение</button>
  </div>
</aside>

<p class="note">Радуга нигде <b>не нарисована</b>. За стеклом — мягкие пятна в цветах токенов бренда, а стекло разводит их каналы при преломлении. Смени бренд — <b>радуга перекрасится сама</b>.</p>
<div class="err" id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const err = (m) => { const e = document.getElementById('err'); e.style.display = 'block'; e.textContent = m; };
addEventListener('error', (e) => err('Ошибка: ' + e.message));

/* палитра — та же, что на alt.html */
const BRANDS = [
  { name: 'SDDS Base',     brand: '#10C8B4', deep: '#0A7F73', on: '#041210', radius: 14 },
  { name: 'GigaBlue',      brand: '#4D82FF', deep: '#2B54C4', on: '#050B1A', radius: 12 },
  { name: 'Salute Violet', brand: '#9A6BFF', deep: '#6A3FD1', on: '#120826', radius: 20 },
  { name: 'Amber Retail',  brand: '#FFB020', deep: '#C77F00', on: '#1A1002', radius: 8 },
  { name: 'Coral Fin',     brand: '#FF6B57', deep: '#C43A28', on: '#1A0704', radius: 26 },
];
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ─────────────── сцена ─────────────── */
const host = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.NoToneMapping;   // цвета токенов должны читаться как есть
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0B0B09');
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 6;

/* окружение — только ради бликов на стекле */
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.35;

/* ─── фон: мягкие пятна в цветах токенов ───
   Ни одного блюра: формы нерезкие по построению — широкий smoothstep,
   край колышется суммой синусов по углу (приём из разбора elvalabs.ai). */
const bgMat = new THREE.ShaderMaterial({
  uniforms: {
    uA: { value: new THREE.Color('#10C8B4') },   // brand
    uB: { value: new THREE.Color('#0A7F73') },   // brand-deep
    uC: { value: new THREE.Color('#6FE9DC') },   // осветлённый brand
    uD: { value: new THREE.Color('#10C8B4') },   // сосед по тону +40°
    uE: { value: new THREE.Color('#10C8B4') },   // сосед по тону −40°
    uTime: { value: 0 },
    uAspect: { value: 1 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform vec3 uA, uB, uC, uD, uE;
    uniform float uTime, uAspect;
    varying vec2 vUv;

    // мягкое пятно с органически колышущимся краем.
    // Ядро тугое (pow), чтобы пятна оставались раздельными, а фон — тёмным:
    // дисперсии нужен контраст, на ровной заливке она не видна.
    float blob(vec2 p, vec2 c, float r, float seed){
      vec2 d = p - c;
      float a = atan(d.y, d.x);
      float w = sin(a * 3.0 + uTime * 0.6 + seed) * 0.05
              + sin(a * 5.0 - uTime * 0.9 + seed) * 0.035
              + sin(a * 2.0 + uTime * 1.1 + seed) * 0.04;
      return pow(1.0 - smoothstep(0.0, r + w, length(d)), 2.6);
    }
    float grain(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

    void main(){
      vec2 p = (vUv - 0.5) * vec2(uAspect, 1.0) * 2.0;
      float t = uTime;
      // по краям кадра — крупные пятна, за карточкой (около центра) — яркие и тугие:
      // именно их стекло и разложит в радугу, преломляя
      float b1 = blob(p, vec2(-1.05 + sin(t * 0.21) * 0.20,  0.45 + cos(t * 0.17) * 0.14), 0.85, 0.0);
      float b2 = blob(p, vec2( 1.10 + cos(t * 0.19) * 0.18, -0.40 + sin(t * 0.23) * 0.16), 0.90, 2.1);
      float b3 = blob(p, vec2(-0.22 + sin(t * 0.13) * 0.16,  0.30 + cos(t * 0.11) * 0.14), 0.42, 4.7);
      float b4 = blob(p, vec2( 0.26 + cos(t * 0.16) * 0.14, -0.32 + sin(t * 0.15) * 0.12), 0.46, 1.3);
      float b5 = blob(p, vec2( 0.02 + sin(t * 0.27) * 0.20, -0.02 + cos(t * 0.20) * 0.16), 0.30, 3.4);
      vec3 col = uB * b1 * 1.1 + uD * b2 * 1.0
               + uA * b3 * 1.9 + uE * b4 * 1.8 + uC * b5 * 3.2;
      col += (grain(vUv * 900.0) - 0.5) * 0.012;   // против полос на градиентах
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const bg = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), bgMat);
bg.position.z = -3;
scene.add(bg);

/* ─── стекло: карточка SDDS ───
   Настоящее стекло Three.js: transmission + thickness + dispersion.
   Радугу не рисуем — её даёт dispersion, разводя каналы при преломлении. */
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff, metalness: 0, roughness: 0.02,
  transmission: 1, thickness: 2.2, ior: 1.62, dispersion: 14,
  clearcoat: 1, clearcoatRoughness: 0.06,
  specularIntensity: 1, envMapIntensity: 1,
});
// толстая фаска — не косметика: дисперсия живёт там, где нормали гнутся,
// на плоской грани разводить каналы нечему
const CARD_W = 2.4, CARD_H = 3.2;
const card = new THREE.Mesh(new RoundedBoxGeometry(CARD_W, CARD_H, 0.5, 10, 0.24), glassMat);
scene.add(card);

/* подсветка — чтобы у граней был блик */
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const key = new THREE.DirectionalLight(0xffffff, 1.6); key.position.set(3, 4, 5); scene.add(key);
const rim = new THREE.DirectionalLight(0xffffff, 0.8); rim.position.set(-4, -2, 3); scene.add(rim);

/* ─── бренд перекрашивает и пятна, и весь интерфейс ─── */
const rootStyle = document.documentElement.style;
const lighten = (hex, k = 0.45) => {
  const c = new THREE.Color(hex); const hsl = {}; c.getHSL(hsl);
  c.setHSL(hsl.h, Math.min(1, hsl.s * 1.05), Math.min(1, hsl.l + k));
  return c;
};
// сосед по тону: остаёмся в семье бренда, но даём разброс — иначе радуге нечего разводить
const hueShift = (hex, deg) => {
  const c = new THREE.Color(hex); const hsl = {}; c.getHSL(hsl);
  c.setHSL((hsl.h + deg / 360 + 1) % 1, hsl.s, hsl.l);
  return c;
};
function applyBrand(b) {
  rootStyle.setProperty('--brand', b.brand);
  rootStyle.setProperty('--brand-deep', b.deep);
  rootStyle.setProperty('--on-brand', b.on);
  rootStyle.setProperty('--radius', b.radius + 'px');
  bgMat.uniforms.uA.value.set(b.brand);
  bgMat.uniforms.uB.value.set(b.deep);
  bgMat.uniforms.uC.value.copy(lighten(b.brand));
  bgMat.uniforms.uD.value.copy(hueShift(b.brand, 42));
  bgMat.uniforms.uE.value.copy(hueShift(b.brand, -42));
  [...document.querySelectorAll('.chip')].forEach((el, i) =>
    el.setAttribute('aria-pressed', String(BRANDS[i] === b)));
}
const chips = document.getElementById('brands');
BRANDS.forEach((b) => {
  const el = document.createElement('button');
  el.className = 'chip'; el.title = b.name;
  el.style.background = `linear-gradient(135deg, ${b.brand}, ${b.deep})`;
  el.onclick = () => applyBrand(b);
  chips.appendChild(el);
});
applyBrand(BRANDS[0]);

/* ─── пульт стекла ─── */
const bind = (id, out, fmt, apply) => {
  const s = document.getElementById(id), o = document.getElementById(out);
  const sync = () => { o.textContent = fmt(+s.value); apply(+s.value); };
  s.addEventListener('input', sync); sync();
};
bind('disp',  'dispV',  (v) => v.toFixed(1), (v) => glassMat.dispersion = v);
bind('thick', 'thickV', (v) => v.toFixed(2), (v) => glassMat.thickness = v);
bind('ior',   'iorV',   (v) => v.toFixed(2), (v) => glassMat.ior = v);
bind('rough', 'roughV', (v) => v.toFixed(2), (v) => glassMat.roughness = v);

let spin = !reduced;
const tgGlass = document.getElementById('tgGlass'), tgSpin = document.getElementById('tgSpin');
tgGlass.onclick = () => { card.visible = !card.visible; tgGlass.setAttribute('aria-pressed', String(card.visible)); };
tgSpin.onclick = () => { spin = !spin; tgSpin.setAttribute('aria-pressed', String(spin)); };
tgSpin.setAttribute('aria-pressed', String(spin));

/* ─── мышь чуть доворачивает карточку ─── */
let mx = 0, my = 0, tmx = 0, tmy = 0;
addEventListener('pointermove', (e) => {
  tmx = (e.clientX / innerWidth - 0.5) * 2; tmy = (e.clientY / innerHeight - 0.5) * 2;
}, { passive: true });

/* ─── размеры: фон точно накрывает кадр ─── */
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h; camera.updateProjectionMatrix();
  const dist = camera.position.z - bg.position.z;
  const vh = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * dist;
  bg.scale.set(vh * camera.aspect, vh, 1);
  bgMat.uniforms.uAspect.value = camera.aspect;
  const s = Math.min(1, (w / h) < 0.8 ? 0.72 : 1);   // на узких экранах карточка мельче
  card.scale.setScalar(s);
}
addEventListener('resize', resize); resize();

/* ручка для отладки: пробник — не прод, ею удобно мерить и подбирать */
window.__probe = { THREE, renderer, scene, camera, card, glassMat, bgMat, applyBrand, BRANDS };

/* ─── кадр ─── */
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  if (!reduced) bgMat.uniforms.uTime.value = t;
  mx += (tmx - mx) * 0.05; my += (tmy - my) * 0.05;
  if (spin) { card.rotation.y = Math.sin(t * 0.28) * 0.5 + mx * 0.35; card.rotation.x = Math.cos(t * 0.22) * 0.18 - my * 0.25; }
  else { card.rotation.y = mx * 0.5; card.rotation.x = -my * 0.35; }
  renderer.render(scene, camera);
});
</script>
</body>
</html>
