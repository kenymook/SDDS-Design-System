<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SDDS — пробник: фон-свечение на живых токенах</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Unbounded:wght@700;900&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#10C8B4; --brand-deep:#0A7F73; --on-brand:#041210; --radius:14px;
  --ink:#EDEDE7; --ink-dim:#8A8A82; --bg:#0B0B09; --line:rgba(237,237,231,.14);
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
  --font-display:'Unbounded',system-ui,sans-serif;
  --font-text:'Golos Text',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font-mono);overflow:hidden;-webkit-font-smoothing:antialiased}
#glow{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ─── шапка ─── */
.top{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:22px 26px;pointer-events:none}
.title{font-family:var(--font-display);font-weight:900;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
.title i{display:block;font-style:normal;font-family:var(--font-mono);font-weight:400;font-size:10.5px;letter-spacing:.12em;color:var(--ink-dim);margin-top:7px;text-transform:none}
.back{pointer-events:auto;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);text-decoration:none;border:1px solid var(--line);border-radius:99px;padding:8px 14px;transition:.2s}
.back:hover{color:var(--ink);border-color:var(--ink-dim)}

/* ─── макет поверх: проверяем читаемость ───
   На светлом поле референса белый текст не живёт — берём тёмный, как у Elva. */
.mock{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .4s}
.mock[data-on="1"]{opacity:1}
.mock h1{position:absolute;top:16vh;left:5vw;max-width:52vw;font-family:var(--font-display);font-weight:900;
  font-size:clamp(34px,5.2vw,74px);line-height:.92;letter-spacing:-.02em;text-transform:uppercase;color:#131313}
.mock h1 em{font-style:normal;-webkit-text-stroke:1.4px #131313;color:transparent}
.mock .card{position:absolute;right:9vw;top:50%;transform:translateY(-50%) rotate(-4deg);
  width:min(280px,26vw);aspect-ratio:3/4;border-radius:var(--radius);background:var(--brand);
  box-shadow:0 34px 80px -24px rgba(0,0,0,.45);display:grid;place-items:center;transition:background .5s,border-radius .5s}
.mock .card b{font-family:var(--font-display);font-weight:900;font-size:26px;color:var(--on-brand);text-transform:uppercase}
/* низ-лево у поля тёмный — текст там светлый; заголовок стоит над светлым ядром — он тёмный */
.mock p{position:absolute;left:5vw;bottom:12vh;max-width:340px;font-family:var(--font-text);font-size:14px;line-height:1.6;color:var(--ink)}

/* ─── пульт: только бренд и макет, настройки зашиты ─── */
.panel{position:fixed;right:26px;bottom:26px;z-index:6;width:250px;background:rgba(11,11,9,.72);
  backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px}
.panel h3{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);font-weight:400;margin-bottom:10px}
.brands{display:flex;gap:7px;margin-bottom:13px}
.chip{flex:1;height:30px;border-radius:9px;border:1px solid var(--line);cursor:pointer;transition:.2s}
.chip:hover{transform:translateY(-2px)}
.chip[aria-pressed="true"]{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.tg{width:100%;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
  background:none;border:1px solid var(--line);border-radius:8px;padding:7px 4px;cursor:pointer;transition:.2s}
.tg[aria-pressed="true"]{color:var(--on-brand);background:var(--brand);border-color:var(--brand)}

.err{position:fixed;inset:auto 0 0 0;z-index:9;background:#5A1A12;color:#fff;padding:10px 16px;font-size:11px;display:none}
@media (max-width:900px){ .mock .card{display:none} }
</style>
</head>
<body>
<canvas id="glow"></canvas>

<div class="mock" id="mock">
  <h1>Одна система.<br><em>Любой бренд.</em></h1>
  <div class="card"><b>Button</b></div>
  <p>Проверяем главное: остаётся ли текст читаемым поверх свечения и не спорит ли оно с карточками.</p>
</div>

<header class="top">
  <div class="title">Фон-свечение<i>как в референсе · без библиотек и без блюра</i></div>
  <a class="back" href="./alt.html">← alt</a>
</header>

<aside class="panel">
  <h3>Бренд</h3>
  <div class="brands" id="brands"></div>
  <button class="tg" id="tgMock" aria-pressed="false">Макет поверх</button>
</aside>

<div class="err" id="err"></div>

<script>
/* ─────────── фон-свечение: чистый WebGL, без библиотек ───────────
   Пересборка по кадрам присланной записи. В референсе это не круглые пятна
   на чёрном, а сплошное поле расфокусированного света: широкие косые лепестки
   на весь кадр, тёмные углы, почти белые ядра, еле тёплый и еле холодный подтон.
   Плюс тонкие радужные «засветки плёнки» вдоль верхней и нижней кромки.
   Блюра нет: формы нерезкие по построению (широкие гауссовы лепестки). */

const BRANDS = [
  { name: 'SDDS Base',     brand: '#10C8B4', deep: '#0A7F73', on: '#041210', radius: 14 },
  { name: 'GigaBlue',      brand: '#4D82FF', deep: '#2B54C4', on: '#050B1A', radius: 12 },
  { name: 'Salute Violet', brand: '#9A6BFF', deep: '#6A3FD1', on: '#120826', radius: 20 },
  { name: 'Amber Retail',  brand: '#FFB020', deep: '#C77F00', on: '#1A1002', radius: 8 },
  { name: 'Coral Fin',     brand: '#FF6B57', deep: '#C43A28', on: '#1A0704', radius: 26 },
];
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const fail = (m) => { const e = document.getElementById('err'); e.style.display = 'block'; e.textContent = m; };

const canvas = document.getElementById('glow');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
if (!gl) fail('WebGL недоступен');

const VERT = `
attribute vec2 aPos;
varying vec2 vUv;
void main(){ vUv = aPos * 0.5 + 0.5; gl_Position = vec4(aPos, 0.0, 1.0); }`;

const FRAG = `
precision highp float;
varying vec2 vUv;
uniform vec3  uCol[5];   // 0 белое ядро · 1 тёплый тон бренда · 2 его глубь · 3 холодный противовес · 4 его глубь
uniform float uTime, uAspect;

// Широкий наклонный лепесток света: растянутая повёрнутая гауссиана.
// Именно форма даёт «расфокус» — никакого блюра не нужно.
float lobe(vec2 p, vec2 c, float ang, vec2 sc, float seed){
  vec2 d = p - c;
  float ca = cos(ang), sa = sin(ang);
  d = vec2(d.x * ca - d.y * sa, d.x * sa + d.y * ca) / sc;
  float w = 1.0 + 0.10 * sin(uTime * 0.23 + seed + d.x * 1.7);   // медленное «дыхание» формы
  return exp(-dot(d, d) * w);
}
float grain(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

// Тонкая радужная «засветка плёнки» у кромки кадра — как в референсе.
float streak(vec2 p, float y0, float seed){
  float wave = 0.018 * sin(p.x * 2.6 + uTime * 0.25 + seed) + 0.008 * sin(p.x * 6.1 - uTime * 0.17 + seed);
  float d = p.y - y0 + wave;
  float along = smoothstep(1.9, 0.3, abs(p.x - sin(uTime * 0.07 + seed) * 0.8));
  return exp(-d * d * 5200.0) * along;
}
// приглушённая радуга: в записи засветки почти белые, цвет лишь угадывается
vec3 prism(float x){ return 0.78 + 0.22 * cos(6.2831 * (x * 0.22) + vec3(0.0, 2.09, 4.19)); }

void main(){
  vec2 p = (vUv - 0.5) * vec2(uAspect, 1.0) * 2.0;
  float t = uTime;
  vec3 col = vec3(0.0);
  // поле света: крупные лепестки крест-накрест; ядро меньше и тише,
  // чтобы плато пересвета было пятном, а не половиной кадра
  col += uCol[0] * 0.95 * lobe(p, vec2( 0.15 + sin(t*.11)*.10,  0.12 + cos(t*.09)*.08),  0.65, vec2(0.62, 0.38), 4.7);
  col += uCol[1] * 0.85 * lobe(p, vec2(-0.85 + sin(t*.08)*.09,  0.42 + cos(t*.12)*.07), -0.55, vec2(1.10, 0.58), 0.0);
  col += uCol[3] * 0.85 * lobe(p, vec2( 0.95 + cos(t*.10)*.09, -0.20 + sin(t*.13)*.08),  0.50, vec2(1.20, 0.65), 2.1);
  col += uCol[2] * 0.65 * lobe(p, vec2(-0.55 + cos(t*.09)*.08, -0.72 + sin(t*.11)*.06),  0.35, vec2(1.00, 0.46), 1.3);
  col += uCol[4] * 0.65 * lobe(p, vec2( 0.55 + sin(t*.12)*.08,  0.80 + cos(t*.08)*.06), -0.40, vec2(0.90, 0.44), 3.4);
  // тёмные углы: свет живёт в центре кадра, как на кадрах записи
  float r = length((vUv - 0.5) * 2.0);
  col *= 1.0 - 0.72 * smoothstep(0.72, 1.42, r);
  // потолок вместо компрессии: ядра в референсе упираются в плато ~0.78
  col = min(col, vec3(0.82));
  // засветки плёнки по кромкам — еле заметные, как в записи
  col += streak(p, 0.94, 1.0) * prism(p.x) * 0.13;
  col += streak(p, -0.96, 3.0) * prism(p.x + 0.35) * 0.10;
  col += (grain(vUv * 900.0) - 0.5) * 0.016;   // зерно против полос
  gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) fail('Шейдер: ' + gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) fail('Программа: ' + gl.getProgramInfoLog(prog));
gl.useProgram(prog);

/* полноэкранный треугольник */
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {};
['uTime', 'uAspect'].forEach(n => U[n] = gl.getUniformLocation(prog, n));
const uCol = [0, 1, 2, 3, 4].map(i => gl.getUniformLocation(prog, `uCol[${i}]`));

/* ─── цвета из токенов бренда ───
   По замерам записи: насыщенность у поля мизерная (медиана 0.05), светлота высокая.
   Тон бренда почти обесцвечиваем; противовес — противоположный тон, тоже глухой. */
const hex2rgb = (h) => [1, 3, 5].map(i => parseInt(h.slice(i, i + 2), 16) / 255);
const rgb2hsl = ([r, g, b]) => {
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), l = (mx + mn) / 2;
  if (mx === mn) return [0, 0, l];
  const d = mx - mn, s = l > .5 ? d / (2 - mx - mn) : d / (mx + mn);
  const h = mx === r ? ((g - b) / d + (g < b ? 6 : 0)) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4;
  return [h / 6, s, l];
};
const hsl2rgb = ([h, s, l]) => {
  if (!s) return [l, l, l];
  const q = l < .5 ? l * (1 + s) : l + s - l * s, p = 2 * l - q;
  const f = (t) => { t = (t + 1) % 1;
    return t < 1/6 ? p + (q - p) * 6 * t : t < 1/2 ? q : t < 2/3 ? p + (q - p) * (2/3 - t) * 6 : p; };
  return [f(h + 1/3), f(h), f(h - 1/3)];
};
const SAT = 0.16;
function tone(hex, degShift, light, satScale) {
  const [h, s] = rgb2hsl(hex2rgb(hex));
  return hsl2rgb([(h + degShift / 360 + 1) % 1, Math.min(1, s * SAT * satScale), light]);
}

let current = BRANDS[0];
const rootStyle = document.documentElement.style;
function applyBrand(b) {
  current = b;
  rootStyle.setProperty('--brand', b.brand);
  rootStyle.setProperty('--brand-deep', b.deep);
  rootStyle.setProperty('--on-brand', b.on);
  rootStyle.setProperty('--radius', b.radius + 'px');
  const set = [
    tone(b.brand,   0, 0.86, 0.30),   // белое ядро с еле заметным подтоном бренда
    tone(b.brand,   0, 0.64, 1.00),   // тон бренда, глухой и светлый
    tone(b.brand,   0, 0.36, 1.30),   // его глубокая часть
    tone(b.brand, 180, 0.60, 1.00),   // противовес: противоположный тон
    tone(b.brand, 180, 0.32, 1.20),   // его глубокая часть
  ];
  gl.useProgram(prog);
  set.forEach((c, i) => gl.uniform3f(uCol[i], c[0], c[1], c[2]));
  [...document.querySelectorAll('.chip')].forEach((el, i) => el.setAttribute('aria-pressed', String(BRANDS[i] === b)));
}
const chips = document.getElementById('brands');
BRANDS.forEach((b) => {
  const el = document.createElement('button');
  el.className = 'chip'; el.title = b.name;
  el.style.background = `linear-gradient(135deg, ${b.brand}, ${b.deep})`;
  el.onclick = () => applyBrand(b);
  chips.appendChild(el);
});
applyBrand(BRANDS[0]);

const mock = document.getElementById('mock'), tgMock = document.getElementById('tgMock');
tgMock.onclick = () => {
  const on = mock.dataset.on !== '1';
  mock.dataset.on = on ? '1' : '0';
  tgMock.setAttribute('aria-pressed', String(on));
};

/* ─── размер ─── */
function resize() {
  const dpr = Math.min(devicePixelRatio, 2);
  canvas.width = Math.round(innerWidth * dpr);
  canvas.height = Math.round(innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(prog); gl.uniform1f(U.uAspect, innerWidth / innerHeight);
}
addEventListener('resize', resize); resize();

/* ─── кадр ─── */
let t = 0, last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  if (!reduced) t += dt;
  gl.useProgram(prog);
  gl.uniform1f(U.uTime, t);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ручка для замеров — пробник, не прод */
window.__probe = { gl, applyBrand, BRANDS, canvas };
</script>
</body>
</html>
