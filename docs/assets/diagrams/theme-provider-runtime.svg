<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Как ThemeProvider передаёт токены компонентам в runtime</title>
  <desc>Объект темы JSON попадает в ThemeProvider, тот инжектит CSS-переменные в root, компонент читает их через var и применяет цвета.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="240" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="56" y="64" font-size="14" font-weight="500" fill="#3C3489">theme.json</text>
  <text x="56" y="86" font-size="12" font-family="ui-monospace, monospace" fill="#534AB7">"Surfaces/.../Negative":</text>
  <text x="56" y="104" font-size="12" font-family="ui-monospace, monospace" fill="#534AB7">  "#F5283C"</text>
  <text x="56" y="126" font-size="12" font-family="ui-monospace, monospace" fill="#534AB7">"Text&amp;Icons/.../Primary":</text>
  <text x="56" y="144" font-size="12" font-family="ui-monospace, monospace" fill="#534AB7">  "#1A1A1A"</text>

  <line x1="280" y1="100" x2="320" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="92" text-anchor="middle" font-size="12" fill="#5F5E5A">импорт</text>

  <rect x="320" y="60" width="200" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="420" y="100" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">&lt;ThemeProvider&gt;</text>
  <text x="420" y="118" text-anchor="middle" font-size="12" fill="#0F6E56">оборачивает дерево</text>

  <line x1="420" y1="140" x2="420" y2="180" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="436" y="166" font-size="12" fill="#5F5E5A">инжектит</text>

  <rect x="220" y="180" width="400" height="120" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="240" y="206" font-size="14" font-weight="500" fill="#633806">:root в DOM</text>
  <text x="240" y="232" font-size="12" font-family="ui-monospace, monospace" fill="#854F0B">--surfaces-default-status-solid-negative: #F5283C</text>
  <text x="240" y="252" font-size="12" font-family="ui-monospace, monospace" fill="#854F0B">--text-icons-default-general-primary: #1A1A1A</text>
  <text x="240" y="278" font-size="12" fill="#854F0B">— около 200 переменных, все на root</text>

  <line x1="420" y1="300" x2="420" y2="340" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="436" y="326" font-size="12" fill="#5F5E5A">читает</text>

  <rect x="220" y="340" width="400" height="160" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="240" y="366" font-size="14" font-weight="500" fill="#1A1A1A">&lt;TextField view="error"&gt;</text>
  <text x="240" y="394" font-size="12" font-family="ui-monospace, monospace" fill="#5F5E5A">background:</text>
  <text x="320" y="394" font-size="12" font-family="ui-monospace, monospace" fill="#5F5E5A">var(--surfaces-...-negative)</text>
  <text x="240" y="416" font-size="12" font-family="ui-monospace, monospace" fill="#5F5E5A">color:</text>
  <text x="320" y="416" font-size="12" font-family="ui-monospace, monospace" fill="#5F5E5A">var(--text-icons-...-primary)</text>

  <rect x="240" y="436" width="360" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="260" y="464" font-size="12" fill="#A32D2D">введите корректный email</text>

  <line x1="40" y1="200" x2="40" y2="500" stroke="#5F5E5A" stroke-width="0.5" opacity="0.2"/>
  <text x="56" y="220" font-size="12" fill="#5F5E5A">шаги</text>

  <circle cx="58" cy="252" r="11" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="256" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">1</text>
  <text x="80" y="256" font-size="12" fill="#5F5E5A">тема инжектится в root</text>

  <circle cx="58" cy="392" r="11" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="396" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">2</text>
  <text x="80" y="396" font-size="12" fill="#5F5E5A">компонент берёт через var</text>

  <circle cx="58" cy="458" r="11" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="462" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">3</text>
  <text x="80" y="462" font-size="12" fill="#5F5E5A">видим итог в UI</text>

  <line x1="40" y1="520" x2="640" y2="520" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <text x="40" y="546" font-size="12" fill="#5F5E5A">смена темы — переинжекция значений на root, компоненты автоматически перерендерятся</text>
  <text x="40" y="566" font-size="12" fill="#5F5E5A">правка компонента ради смены цвета — антипаттерн: значит, где-то захардкожен цвет</text>
</svg>
