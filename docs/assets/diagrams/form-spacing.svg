<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Шкала отступов в форме регистрации</title>
  <desc>Форма с тремя полями ввода и двумя кнопками. Между полями 16px, между группой и кнопкой 24px, между кнопками 8px.</desc>

  <text x="40" y="36" font-size="14" font-weight="500" fill="#1A1A1A">Регистрация</text>

  <text x="200" y="62" font-size="12" fill="#5F5E5A">Email</text>
  <rect x="200" y="70" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>

  <text x="200" y="156" font-size="12" fill="#5F5E5A">Пароль</text>
  <rect x="200" y="164" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>

  <text x="200" y="250" font-size="12" fill="#5F5E5A">Подтверждение пароля</text>
  <rect x="200" y="258" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>

  <rect x="200" y="330" width="180" height="48" rx="8" fill="#185FA5"/>
  <text x="290" y="360" text-anchor="middle" font-size="14" font-weight="500" fill="#FFFFFF">Зарегистрироваться</text>

  <rect x="388" y="330" width="92" height="48" rx="8" fill="none" stroke="#888780" stroke-width="0.5"/>
  <text x="434" y="360" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1A1A">Отмена</text>

  <line x1="170" y1="118" x2="170" y2="148" stroke="#5DCAA5" stroke-width="0.5"/>
  <line x1="166" y1="118" x2="174" y2="118" stroke="#5DCAA5" stroke-width="0.5"/>
  <line x1="166" y1="148" x2="174" y2="148" stroke="#5DCAA5" stroke-width="0.5"/>
  <rect x="138" y="125" width="26" height="16" fill="#FFFFFF" rx="3"/>
  <text x="151" y="137" text-anchor="middle" font-size="12" fill="#0F6E56">16</text>

  <line x1="170" y1="212" x2="170" y2="242" stroke="#5DCAA5" stroke-width="0.5"/>
  <line x1="166" y1="212" x2="174" y2="212" stroke="#5DCAA5" stroke-width="0.5"/>
  <line x1="166" y1="242" x2="174" y2="242" stroke="#5DCAA5" stroke-width="0.5"/>
  <rect x="138" y="219" width="26" height="16" fill="#FFFFFF" rx="3"/>
  <text x="151" y="231" text-anchor="middle" font-size="12" fill="#0F6E56">16</text>

  <line x1="170" y1="306" x2="170" y2="330" stroke="#EF9F27" stroke-width="0.5"/>
  <line x1="166" y1="306" x2="174" y2="306" stroke="#EF9F27" stroke-width="0.5"/>
  <line x1="166" y1="330" x2="174" y2="330" stroke="#EF9F27" stroke-width="0.5"/>
  <rect x="138" y="313" width="26" height="16" fill="#FFFFFF" rx="3"/>
  <text x="151" y="325" text-anchor="middle" font-size="12" fill="#854F0B">24</text>

  <line x1="380" y1="394" x2="388" y2="394" stroke="#7F77DD" stroke-width="0.5"/>
  <line x1="380" y1="390" x2="380" y2="398" stroke="#7F77DD" stroke-width="0.5"/>
  <line x1="388" y1="390" x2="388" y2="398" stroke="#7F77DD" stroke-width="0.5"/>
  <rect x="372" y="402" width="22" height="16" fill="#FFFFFF" rx="3"/>
  <text x="383" y="414" text-anchor="middle" font-size="12" fill="#3C3489">8</text>

  <line x1="40" y1="446" x2="640" y2="446" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <rect x="40" y="466" width="12" height="12" rx="2" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
  <text x="60" y="478" font-size="12" fill="#5F5E5A">16px — поля внутри одной группы</text>

  <rect x="270" y="466" width="12" height="12" rx="2" fill="#EF9F27" stroke="#854F0B" stroke-width="0.5" opacity="0.6"/>
  <text x="290" y="478" font-size="12" fill="#5F5E5A">24px — группа полей и действия</text>

  <rect x="40" y="496" width="12" height="12" rx="2" fill="#7F77DD" stroke="#3C3489" stroke-width="0.5" opacity="0.6"/>
  <text x="60" y="508" font-size="12" fill="#5F5E5A">8px — кнопки внутри одной группы действий</text>
</svg>
