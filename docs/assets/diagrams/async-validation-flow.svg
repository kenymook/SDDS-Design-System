<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 600" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Полный жизненный путь async-валидации поля</title>
  <desc>Последовательность: blur, проверка кэша, loading-индикация, серверный запрос, результат — success или error.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="48" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1A1A">onBlur поля</text>

  <line x1="340" y1="64" x2="340" y2="86" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="86" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="110" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Значение в кэше?</text>
  <text x="340" y="130" text-anchor="middle" font-size="12" fill="#534AB7">проверяли это раньше</text>

  <path d="M 240 142 L 240 170 L 130 170 L 130 200" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="180" y="164" text-anchor="middle" font-size="12" fill="#5F5E5A">да</text>

  <path d="M 440 142 L 440 170 L 550 170 L 550 200" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="164" text-anchor="middle" font-size="12" fill="#5F5E5A">нет</text>

  <rect x="40" y="200" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="130" y="228" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1A1A">Берём кэш</text>

  <rect x="460" y="200" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="550" y="224" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">view → loading</text>
  <text x="550" y="244" text-anchor="middle" font-size="12" fill="#854F0B">spinner в contentRight</text>

  <line x1="550" y1="256" x2="550" y2="290" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="450" y="290" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="550" y="314" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Запрос на сервер</text>
  <text x="550" y="334" text-anchor="middle" font-size="12" fill="#854F0B">api.checkEmail(value)</text>

  <line x1="550" y1="346" x2="550" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="430" y="380" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="550" y="404" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Результат проверки</text>
  <text x="550" y="424" text-anchor="middle" font-size="12" fill="#534AB7">пишем в кэш</text>

  <path d="M 130 244 L 130 470 L 200 470" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M 480 436 L 480 470 L 240 470" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="462" text-anchor="middle" font-size="12" fill="#5F5E5A">валидно</text>

  <path d="M 620 436 L 620 470 L 460 470" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="462" text-anchor="middle" font-size="12" fill="#5F5E5A">невалидно</text>

  <rect x="40" y="470" width="200" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="140" y="494" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">view="success"</text>
  <text x="140" y="514" text-anchor="middle" font-size="12" fill="#3B6D11">или возврат к default</text>

  <rect x="260" y="470" width="200" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="360" y="494" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">view="error"</text>
  <text x="360" y="514" text-anchor="middle" font-size="12" fill="#A32D2D">текст ошибки в hint</text>

  <rect x="480" y="470" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="494" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Submit во время</text>
  <text x="570" y="514" text-anchor="middle" font-size="12" fill="#993C1D">ждём, не блокируем</text>

  <line x1="40" y1="220" x2="20" y2="220" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="20" y1="220" x2="20" y2="560" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <text x="40" y="556" font-size="12" fill="#5F5E5A">кэш сохраняем между blur — не повторяем запрос для того же значения</text>
</svg>
