<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 460" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Соответствие пропов компонента и ARIA-атрибутов в DOM</title>
  <desc>Слева пропы Figma и React, справа ARIA-атрибуты, между ними линии соответствия. Внизу пропы, требующие ручной работы.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="120" y="40" font-size="14" font-weight="500" fill="#1A1A1A">Проп компонента</text>
  <text x="120" y="58" font-size="12" fill="#5F5E5A">Figma и React</text>

  <text x="560" y="40" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1A1A">ARIA-атрибут в DOM</text>
  <text x="560" y="58" text-anchor="middle" font-size="12" fill="#5F5E5A">приходит автоматически</text>

  <rect x="20" y="80" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="104" text-anchor="middle" font-size="14" fill="#3C3489">Required=True</text>
  <line x1="240" y1="100" x2="440" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="80" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="104" text-anchor="middle" font-size="14" fill="#085041">aria-required="true"</text>

  <rect x="20" y="130" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="154" text-anchor="middle" font-size="14" fill="#3C3489">View=Error</text>
  <line x1="240" y1="150" x2="440" y2="150" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="130" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="154" text-anchor="middle" font-size="14" fill="#085041">aria-invalid="true"</text>

  <rect x="20" y="180" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="204" text-anchor="middle" font-size="14" fill="#3C3489">Disabled=True</text>
  <line x1="240" y1="200" x2="440" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="180" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="204" text-anchor="middle" font-size="14" fill="#085041">disabled (нативный)</text>

  <rect x="20" y="230" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="254" text-anchor="middle" font-size="14" fill="#3C3489">Loading=True</text>
  <line x1="240" y1="250" x2="440" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="230" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="254" text-anchor="middle" font-size="14" fill="#085041">aria-busy="true"</text>

  <rect x="20" y="280" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="304" text-anchor="middle" font-size="14" fill="#3C3489">Opened=True</text>
  <line x1="240" y1="300" x2="440" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="280" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="304" text-anchor="middle" font-size="14" fill="#085041">aria-expanded="true"</text>

  <rect x="20" y="330" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="354" text-anchor="middle" font-size="14" fill="#3C3489">Value=Multiple (CheckBox)</text>
  <line x1="240" y1="350" x2="440" y2="350" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="330" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="354" text-anchor="middle" font-size="14" fill="#085041">aria-checked="mixed"</text>

  <line x1="20" y1="394" x2="660" y2="394" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <rect x="20" y="406" width="220" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="130" y="430" text-anchor="middle" font-size="14" fill="#712B13">IconButton без текста</text>
  <line x1="240" y1="426" x2="440" y2="426" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <rect x="440" y="406" width="240" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="560" y="430" text-anchor="middle" font-size="14" fill="#712B13">aria-label — пишете вы</text>
</svg>
