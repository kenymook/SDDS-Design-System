<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 360" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Анатомия TextField со всеми слотами</title>
  <desc>Поле ввода с лейблом сверху, маркером required справа от лейбла, иконкой слева, иконкой справа и hint-текстом снизу. К каждому слоту ведёт выноска с именем пропа.</desc>

  <text x="170" y="80" font-size="14" font-weight="500" fill="#1A1A1A">Email</text>
  <text x="206" y="80" font-size="14" font-weight="500" fill="#A32D2D">*</text>

  <rect x="170" y="100" width="340" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" opacity="0.6"/>

  <circle cx="194" cy="124" r="7" fill="none" stroke="#5F5E5A" stroke-width="1.2" opacity="0.5"/>
  <line x1="199" y1="129" x2="204" y2="134" stroke="#5F5E5A" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <text x="220" y="128" font-size="14" fill="#5F5E5A" opacity="0.7">mail@example.com</text>

  <line x1="486" y1="118" x2="486" y2="130" stroke="#5F5E5A" stroke-width="1" opacity="0.5"/>
  <polyline points="482,124 486,130 490,124" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <text x="170" y="170" font-size="12" fill="#5F5E5A">Введите корректный email-адрес</text>

  <line x1="200" y1="78" x2="80" y2="50" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="200" cy="78" r="2" fill="#5F5E5A"/>
  <text x="76" y="46" text-anchor="end" font-size="12" fill="#1A1A1A">label slot</text>
  <text x="76" y="62" text-anchor="end" font-size="12" fill="#5F5E5A" opacity="0.8">LabelPlacement=Outer</text>

  <line x1="208" y1="80" x2="296" y2="34" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="208" cy="80" r="2" fill="#5F5E5A"/>
  <text x="304" y="30" font-size="12" fill="#1A1A1A">requiredMarker</text>
  <text x="304" y="46" font-size="12" fill="#5F5E5A" opacity="0.8">Required=True · Placement=Right</text>

  <line x1="194" y1="124" x2="124" y2="200" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="194" cy="124" r="2" fill="#5F5E5A"/>
  <text x="120" y="216" text-anchor="end" font-size="12" fill="#1A1A1A">contentLeft slot</text>
  <text x="120" y="232" text-anchor="end" font-size="12" fill="#5F5E5A" opacity="0.8">ContentLeft=True</text>

  <line x1="340" y1="124" x2="340" y2="246" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="340" cy="124" r="2" fill="#5F5E5A"/>
  <text x="340" y="262" text-anchor="middle" font-size="12" fill="#1A1A1A">control (обязателен)</text>
  <text x="340" y="278" text-anchor="middle" font-size="12" fill="#5F5E5A" opacity="0.8">сам элемент ввода</text>

  <line x1="486" y1="124" x2="556" y2="200" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="486" cy="124" r="2" fill="#5F5E5A"/>
  <text x="560" y="216" font-size="12" fill="#1A1A1A">contentRight slot</text>
  <text x="560" y="232" font-size="12" fill="#5F5E5A" opacity="0.8">ContentRight=Icon</text>

  <line x1="200" y1="170" x2="80" y2="290" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="200" cy="170" r="2" fill="#5F5E5A"/>
  <text x="76" y="306" text-anchor="end" font-size="12" fill="#1A1A1A">hint slot</text>
  <text x="76" y="322" text-anchor="end" font-size="12" fill="#5F5E5A" opacity="0.8">HintPlacement=Outer</text>
</svg>
